<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#10231b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="热量账本">
  <title>热量账本</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="brand">
        <img src="./icon-192.png" alt="">
        <div>
          <strong>热量账本</strong>
          <span id="syncStatus">本机记录</span>
        </div>
      </div>
      <button id="installBtn" class="install" type="button" hidden>安装</button>
    </header>

    <main>
      <section class="date-strip">
        <button id="prevDay" class="round" type="button" aria-label="上一天">‹</button>
        <label>
          <span>日期</span>
          <input id="date" type="date">
        </label>
        <button id="nextDay" class="round" type="button" aria-label="下一天">›</button>
      </section>

      <section class="score-card">
        <div>
          <span>今日盈余</span>
          <strong id="balance">0</strong>
        </div>
        <small id="balanceHint">kcal</small>
      </section>

      <section class="summary">
        <article><span>摄入</span><strong id="intake">0</strong></article>
        <article><span>消耗</span><strong id="totalBurn">0</strong></article>
        <article><span>BMR</span><strong id="bmr">0</strong></article>
        <article><span>运动</span><strong id="exerciseBurn">0</strong></article>
      </section>

      <nav class="tabs" aria-label="功能">
        <button class="tab active" type="button" data-panel="mealPanel">饮食</button>
        <button class="tab" type="button" data-panel="exercisePanel">运动</button>
        <button class="tab" type="button" data-panel="profilePanel">身体</button>
      </nav>

      <section id="mealPanel" class="panel active">
        <div class="camera-box">
          <input id="photo" type="file" accept="image/*" capture="environment">
          <img id="preview" alt="餐食预览">
          <div id="photoEmpty">
            <b>+</b>
            <span>拍照 / 上传</span>
          </div>
        </div>
        <button id="analyzeMeal" class="ai-btn" type="button">AI 识别并加入</button>

        <div class="preset-row">
          <label>
            <span>食物库</span>
            <select id="foodPreset"></select>
          </label>
          <button id="usePreset" class="soft-btn" type="button">填入</button>
        </div>

        <div class="form-grid meal-grid">
          <label>
            <span>食物</span>
            <input id="foodName" placeholder="鸡胸肉">
          </label>
          <label>
            <span>份量 g/ml</span>
            <input id="foodAmount" type="number" inputmode="decimal" min="1" value="100">
          </label>
          <label>
            <span>kcal / 100g</span>
            <input id="foodCal" type="number" inputmode="decimal" min="0" value="116">
          </label>
        </div>
        <button id="addMeal" class="primary" type="button">加入饮食</button>
      </section>

      <section id="exercisePanel" class="panel">
        <div class="form-grid">
          <label>
            <span>项目</span>
            <select id="exerciseType"></select>
          </label>
          <div class="two">
            <label>
              <span>分钟</span>
              <input id="exerciseMinutes" type="number" inputmode="decimal" min="1" value="30">
            </label>
            <label>
              <span>MET</span>
              <input id="exerciseMet" type="number" inputmode="decimal" min="1" step="0.1" value="6">
            </label>
          </div>
        </div>
        <button id="addExercise" class="primary" type="button">加入运动</button>
      </section>

      <section id="profilePanel" class="panel">
        <div class="form-grid">
          <div class="two">
            <label>
              <span>性别</span>
              <select id="sex">
                <option value="male">男</option>
                <option value="female">女</option>
              </select>
            </label>
            <label>
              <span>年龄</span>
              <input id="age" type="number" inputmode="numeric" min="12" max="100" value="28">
            </label>
          </div>
          <div class="two">
            <label>
              <span>身高 cm</span>
              <input id="height" type="number" inputmode="decimal" min="120" max="230" value="175">
            </label>
            <label>
              <span>体重 kg</span>
              <input id="weight" type="number" inputmode="decimal" min="35" max="220" value="75">
            </label>
          </div>
          <label>
            <span>日常活动</span>
            <select id="activity">
              <option value="1.2">久坐</option>
              <option value="1.35">轻活动</option>
              <option value="1.55">中等活动</option>
              <option value="1.75">高活动</option>
            </select>
          </label>
        </div>
      </section>

      <section class="log">
        <div class="section-title">
          <h2>今日明细</h2>
          <button id="clearDay" class="clear" type="button">清空</button>
        </div>
        <div id="mealList" class="list"></div>
        <div id="exerciseList" class="list"></div>
      </section>
    </main>
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
